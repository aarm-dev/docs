<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AARM Builder Registry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: transparent; color: #1e293b; padding: 0 4px; }

  .stats { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .stat { border-radius: 8px; padding: 6px 14px; font-size: 13px; }
  .stat-conf { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .stat-conf strong { color: #16a34a; }
  .stat-conf span { color: #15803d; }
  .stat-align { background: #eff6ff; border: 1px solid #bfdbfe; }
  .stat-align strong { color: #2563eb; }
  .stat-align span { color: #1d4ed8; }
  .stat-count { font-size: 13px; color: #94a3b8; margin-left: auto; }

  .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1 1 220px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.3; }
  .search-input {
    width: 100%; padding: 8px 12px 8px 32px; border-radius: 8px;
    border: 1px solid #e2e8f0; font-size: 13px; outline: none;
    background: #fff; color: #1e293b; font-family: inherit;
  }
  .search-input:focus { border-color: #93c5fd; }
  .filter-select {
    padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
    font-size: 13px; background: #fff; color: #1e293b; cursor: pointer; font-family: inherit;
  }
  .clear-btn {
    padding: 8px 14px; border-radius: 8px; border: 1px solid #fca5a5;
    font-size: 13px; background: #fef2f2; color: #dc2626;
    cursor: pointer; font-weight: 600; font-family: inherit; display: none;
  }
  .clear-btn.visible { display: inline-block; }

  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f8fafc; }
  th {
    padding: 10px 14px; text-align: left; font-weight: 600; color: #475569;
    cursor: pointer; user-select: none; border-bottom: 2px solid #e2e8f0;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
  }
  th.no-sort { cursor: default; }
  .sort-arrow { font-size: 10px; margin-left: 4px; }
  .sort-arrow.active { color: #0ea5e9; }
  .sort-arrow.inactive { color: #cbd5e1; }

  tbody tr { transition: background 0.12s; cursor: pointer; }
  tbody tr:hover { background: #f0f7ff !important; }
  tbody tr.conf-row { background: #f0fdf4; }
  tbody tr.conf-row:hover { background: #dcfce7 !important; }
  tbody tr.even { background: #fff; }
  tbody tr.odd { background: #fafbfd; }
  td { padding: 8px 14px; border-bottom: 1px solid #f1f5f9; }

  .company-cell { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .logo-img { width: 24px; height: 24px; border-radius: 6px; object-fit: contain; flex-shrink: 0; background: #fff; }
  .logo-fallback {
    width: 24px; height: 24px; border-radius: 6px; background: #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #64748b; flex-shrink: 0;
  }
  .company-name { font-weight: 600; color: #0f172a; }
  .ext-arrow { color: #cbd5e1; font-size: 11px; }

  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.03em;
    text-transform: uppercase; color: #fff;
  }
  .badge-conf { background: #22c55e; }
  .badge-aligned { background: #3b82f6; }

  .desc-cell { color: #64748b; font-size: 12px; line-height: 1.5; }

  .empty-row td { padding: 48px 14px; text-align: center; color: #94a3b8; font-size: 14px; }

  .footer { margin-top: 12px; font-size: 11px; color: #94a3b8; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin: 0 4px 0 8px; vertical-align: middle; }
  .dot-conf { background: #22c55e; }
  .dot-aligned { background: #3b82f6; }
</style>
</head>
<body>

<div class="stats">
  <div class="stat stat-conf"><strong id="confCount"></strong> <span>Conformant</span></div>
  <div class="stat stat-align"><strong id="alignCount"></strong> <span>Aligned</span></div>
  <div class="stat-count"><span id="shownCount"></span> of <span id="totalCount"></span> shown</div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search builders...">
  </div>
  <select class="filter-select" id="filterSelect">
    <option value="">All Status</option>
    <option value="Conformant">Conformant</option>
    <option value="Aligned">Aligned</option>
  </select>
  <button class="clear-btn" id="clearBtn">Clear</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th id="sort-name" data-field="name">Company <span class="sort-arrow inactive">⇅</span></th>
        <th id="sort-conformance" data-field="conformance" style="width:110px">Status <span class="sort-arrow active">▲</span></th>
        <th class="no-sort">Description</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="footer">
  Click any row to visit · Sort by clicking column headers ·
  <span class="dot dot-conf"></span>Conformant
  <span class="dot dot-aligned"></span>Aligned
</div>

<script>
const BUILDERS = [
  { name: "Noma Security", desc: "A unified platform to secure and govern your AI and agents, delivering enterprise-grade protection.", conformance: "Conformant", url: "https://www.noma.security" },
  { name: "Runlayer", desc: "One platform for MCPs, Skills, and Agents, with purpose-built security, fine-grained governance, and complete observability.", conformance: "Conformant", url: "https://www.runlayer.com" },
  { name: "Formal", desc: "Formal enforces least-privilege at the wire protocol layer for humans and AI agents.", conformance: "Conformant", url: "https://www.formalhq.com" },
  { name: "Kontext", desc: "Runtime authorization for AI agents with least-privilege tool calls, scoped credentials, audit trails, and instant revocation.", conformance: "Aligned", url: "https://kontext.security" },
  { name: "MintMCP", desc: "Enterprise governance platform for AI agents and MCP servers.", conformance: "Aligned", url: "https://www.mintmcp.com" },
  { name: "Lasso", desc: "Lasso is the AI Security Platform built for the agentic era.", conformance: "Aligned", url: "https://www.lasso.security" },
  { name: "HiddenLayer", desc: "The most comprehensive security platform for AI.", conformance: "Aligned", url: "https://hiddenlayer.com" },
  { name: "Ultra", desc: "The easy and secure way for people and agents to use MCP. Autonomous runtime security.", conformance: "Aligned", url: "https://ultra.security" },
  { name: "Manifold Security", desc: "AI Detection and Response Platform.", conformance: "Aligned", url: "https://www.manifold.security" },
  { name: "Operant AI", desc: "Discover, Detect, and Defend your AI, Agents, and MCP in real-time.", conformance: "Aligned", url: "https://www.operant.ai" },
  { name: "Tenet", desc: "Your Agents Have Real Access. Give Them Real Defense.", conformance: "Aligned", url: "https://www.tenetsecurity.ai" },
  { name: "Certiv", desc: "Runtime Assurance for AI Agents. Complete visibility and control.", conformance: "Aligned", url: "https://www.certiv.ai" },
  { name: "Pillar Security", desc: "Build and Run Secure AI Systems.", conformance: "Aligned", url: "https://pillar.security" },
  { name: "Aten Security", desc: "Thoth enforces behavioral policies on AI agent tool calls at the SDK layer.", conformance: "Aligned", url: "https://atensecurity.com" },
  { name: "Golf", desc: "Agentic AI governance and security gateway for enterprises.", conformance: "Aligned", url: "https://golf.dev" },
  { name: "ArmorIQ", desc: "Intent is the new perimeter.", conformance: "Aligned", url: "https://armoriq.ai" },
  { name: "Aegis Security", desc: "A runtime security control plane for AI agents.", conformance: "Aligned", url: "https://aegissecurity.dev" },
  { name: "Faramesh", desc: "Intent-to-action control layer for AI agents.", conformance: "Aligned", url: "https://faramesh.dev" },
  { name: "Repello AI", desc: "End-to-end security for autonomous AI systems through continuous discovery and automated red teaming.", conformance: "Aligned", url: "https://repello.ai" },
  { name: "Cakewalk", desc: "Agentic Access Management for fast-moving companies.", conformance: "Aligned", url: "https://www.getcakewalk.io" },
  { name: "Permit.io", desc: "Full Stack authorization as a service.", conformance: "Aligned", url: "https://permit.io" },
  { name: "Aira Security", desc: "Enforcement layer for agents that blocks malicious or accidental actions.", conformance: "Aligned", url: "https://airasecurity.ai" },
  { name: "DecisionGuard", desc: "Pre-execution assurance for automated and AI-driven systems.", conformance: "Aligned", url: "https://decision-guard.com" },
  { name: "SEVORIX", desc: "A local, Rust-based runtime firewall for AI agents.", conformance: "Aligned", url: "https://sevorix.ai" },
  { name: "Clevr Security", desc: "Authorizes AI agent actions in real time by evaluating intent and business context.", conformance: "Aligned", url: "https://clevrsecurity.com" },
  { name: "Assury", desc: "Self-hosted runtime control plane that enforces AARM-conformant policy over AI agent actions.", conformance: "Aligned", url: "https://assury.ai" },
  { name: "Rivaro", desc: "Runtime enforcement platform for AI agents with identity-aware policy controls.", conformance: "Aligned", url: "https://rivaro.ai" },
  { name: "Refractal", desc: "The multimodal security layer for AI agents.", conformance: "Aligned", url: "https://www.refractal-ai.com" },
  { name: "Fencio", desc: "Runtime security platform for deterministic control over autonomous agents.", conformance: "Aligned", url: "https://fencio.dev" },
  { name: "The MCP Company", desc: "Dev tool giving control and visibility over agents and MCP actions.", conformance: "Aligned", url: "https://themcp.company" },
  { name: "Laptop Bot", desc: "AI Security and Governance for laptops.", conformance: "Aligned", url: "https://laptop.bot" },
  { name: "Raxit", desc: "Preemptive cybersecurity platform for AI agents.", conformance: "Aligned", url: "https://raxit.ai" },
  { name: "Highflame", desc: "Unified enterprise Agent security platform with real-time protection and multi-turn behavioral control.", conformance: "Aligned", url: "https://highflame.com" },
  { name: "Cortexhub", desc: "Runtime governance for AI-era systems.", conformance: "Aligned", url: "https://cortexhub.ai" },
  { name: "Aris", desc: "Finds what's running, measures the exposure, and gives you control where it matters.", conformance: "Aligned", url: "https://aris-platform.com" },
  { name: "Pipelock", desc: "Open-source firewall for AI agents. Single binary, no cloud required.", conformance: "Aligned", url: "https://pipelab.org" },
  { name: "Secure Agentics", desc: "Real time security monitoring and control with cognitive reasoning technology.", conformance: "Aligned", url: "https://secureagentics.ai" },
  { name: "Guardion.AI", desc: "Runtime security layer observing, enforcing, and blocking unsafe actions.", conformance: "Aligned", url: "https://guardion.ai" },
  { name: "Cogensec.AI", desc: "Defines and measures structural integrity for agents to operate safely.", conformance: "Aligned", url: "https://cogensec.com" },
  { name: "Unbound Security", desc: "The Agent Access Security Broker for AI coding agents.", conformance: "Aligned", url: "https://getunbound.ai" },
  { name: "QueryStory", desc: "AI-powered data intelligence platform with zero trust agent architecture.", conformance: "Aligned", url: "https://querystory.ai" },
  { name: "z0.ai", desc: "Internal agent platform for security and compliance conscious companies.", conformance: "Aligned", url: "https://www.z0.ai" },
  { name: "Optimus Labs", desc: "Secures AI agents at the endpoint where prompt injection, sensitive data, and autonomous action converge.", conformance: "Aligned", url: "https://www.optimuslabs.io" },
  { name: "SovereignAI Security Labs", desc: "SentraGuard: centralized, API-first GenAI security and guardrails platform.", conformance: "Aligned", url: "https://www.sovereignaisecurity.com" },
  { name: "Akto", desc: "Agentic AI Security platform for enterprises to secure AI agents, MCPs, and LLMs.", conformance: "Aligned", url: "https://www.akto.io" },
  { name: "LangGuard", desc: "AI Control Plane for runtime governance and automated remediation.", conformance: "Aligned", url: "https://www.langguard.ai" },
  { name: "Capsule Security", desc: "Protects AI agents at runtime with a Guardian Agent that detects rogue behavior.", conformance: "Aligned", url: "https://www.capsulesecurity.io" },
  { name: "Strix Governance", desc: "Embedded governance kernel with execution tokens, SHA-256 proof flow, and tamper-evident audit trails.", conformance: "Aligned", url: "https://www.strixgov.com" },
];

let sortField = "conformance";
let sortDir = "asc";

const searchInput = document.getElementById("searchInput");
const filterSelect = document.getElementById("filterSelect");
const clearBtn = document.getElementById("clearBtn");
const tableBody = document.getElementById("tableBody");

function getDomain(url) {
  try { return new URL(url).hostname.replace("www.", ""); } catch { return ""; }
}

function faviconUrl(url) {
  const d = getDomain(url);
  return d ? "https://www.google.com/s2/favicons?domain=" + d + "&sz=64" : "";
}

function getFiltered() {
  const q = searchInput.value.toLowerCase();
  const f = filterSelect.value;
  let rows = BUILDERS.filter(b => {
    const matchSearch = !q || b.name.toLowerCase().includes(q) || b.desc.toLowerCase().includes(q);
    const matchConf = !f || b.conformance === f;
    return matchSearch && matchConf;
  });

  rows.sort((a, b) => {
    let av, bv;
    if (sortField === "conformance") {
      av = a.conformance === "Conformant" ? 0 : 1;
      bv = b.conformance === "Conformant" ? 0 : 1;
    } else {
      av = (a[sortField] || "").toLowerCase();
      bv = (b[sortField] || "").toLowerCase();
    }
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });
  return rows;
}

function render() {
  const rows = getFiltered();
  const confCount = BUILDERS.filter(b => b.conformance === "Conformant").length;
  const alignedCount = BUILDERS.filter(b => b.conformance === "Aligned").length;

  document.getElementById("confCount").textContent = confCount;
  document.getElementById("alignCount").textContent = alignedCount;
  document.getElementById("shownCount").textContent = rows.length;
  document.getElementById("totalCount").textContent = BUILDERS.length;

  // Update clear button
  clearBtn.classList.toggle("visible", searchInput.value || filterSelect.value);

  // Update sort arrows
  document.querySelectorAll("th[data-field]").forEach(th => {
    const field = th.dataset.field;
    const arrow = th.querySelector(".sort-arrow");
    if (field === sortField) {
      arrow.className = "sort-arrow active";
      arrow.textContent = sortDir === "asc" ? "▲" : "▼";
    } else {
      arrow.className = "sort-arrow inactive";
      arrow.textContent = "⇅";
    }
  });

  if (rows.length === 0) {
    tableBody.innerHTML = '<tr class="empty-row"><td colspan="3">No builders match your search.</td></tr>';
    return;
  }

  let alignedIdx = 0;
  tableBody.innerHTML = rows.map(b => {
    const isConf = b.conformance === "Conformant";
    let rowClass;
    if (isConf) {
      rowClass = "conf-row";
    } else {
      rowClass = alignedIdx % 2 === 0 ? "even" : "odd";
      alignedIdx++;
    }
    const fav = faviconUrl(b.url);
    const logoHtml = fav
      ? `<img class="logo-img" src="${fav}" alt="" onerror="this.outerHTML='<div class=\\'logo-fallback\\'>${b.name.charAt(0)}</div>'">`
      : `<div class="logo-fallback">${b.name.charAt(0)}</div>`;

    return `<tr class="${rowClass}" onclick="window.open('${b.url}','_blank')">
      <td>
        <div class="company-cell">
          ${logoHtml}
          <span class="company-name">${b.name}</span>
          <span class="ext-arrow">↗</span>
        </div>
      </td>
      <td><span class="badge ${isConf ? "badge-conf" : "badge-aligned"}">${b.conformance}</span></td>
      <td class="desc-cell">${b.desc}</td>
    </tr>`;
  }).join("");
}

// Sort handler
document.querySelectorAll("th[data-field]").forEach(th => {
  th.addEventListener("click", () => {
    const field = th.dataset.field;
    if (sortField === field) {
      sortDir = sortDir === "asc" ? "desc" : "asc";
    } else {
      sortField = field;
      sortDir = "asc";
    }
    render();
  });
});

searchInput.addEventListener("input", render);
filterSelect.addEventListener("change", render);
clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  filterSelect.value = "";
  render();
});

render();
</script>
</body>
</html>
